# ================================================================
# Security Headers Configuration
# ================================================================
# Compatible with Nginx and Traefik reverse proxies.
# Apply these headers to ALL responses from the application.
#
# Reference: https://owasp.org/www-project-secure-headers/
# Test with: https://securityheaders.com/
# ================================================================

# --- Nginx Configuration ---
# Include this file in your server block:
#   include /etc/nginx/conf.d/security-headers.conf;

# Prevent MIME type sniffing — stops browsers from guessing content types
add_header X-Content-Type-Options "nosniff" always;

# Prevent clickjacking — disallow embedding this site in iframes
add_header X-Frame-Options "DENY" always;

# Enable XSS filter in legacy browsers (modern browsers ignore it)
add_header X-XSS-Protection "1; mode=block" always;

# Force HTTPS for 1 year, include subdomains, allow preload list
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Control referrer information sent with requests
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Content Security Policy — restrict resource origins
# IMPORTANT: Adjust 'self' and allowed domains to match your deployment
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://unpkg.com; connect-src 'self' https://iagenteksupabase.iagentek.com.mx https://iagentekn8nwebhook.iagentek.com.mx https://apiinmobiliario.iagentek.com.mx https://nominatim.openstreetmap.org https://overpass-api.de; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

# Restrict browser features and APIs
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

# Prevent caching of sensitive pages (adjust per route as needed)
add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
add_header Pragma "no-cache" always;

# Remove server version information (requires separate Nginx config)
# server_tokens off;

# ================================================================
# --- Traefik Labels (Docker Compose) ---
# Add these labels to your service in docker-compose.yml:
#
# labels:
#   - "traefik.http.middlewares.security-headers.headers.customResponseHeaders.X-Content-Type-Options=nosniff"
#   - "traefik.http.middlewares.security-headers.headers.customResponseHeaders.X-Frame-Options=DENY"
#   - "traefik.http.middlewares.security-headers.headers.customResponseHeaders.X-XSS-Protection=1; mode=block"
#   - "traefik.http.middlewares.security-headers.headers.customResponseHeaders.Strict-Transport-Security=max-age=31536000; includeSubDomains; preload"
#   - "traefik.http.middlewares.security-headers.headers.customResponseHeaders.Referrer-Policy=strict-origin-when-cross-origin"
#   - "traefik.http.middlewares.security-headers.headers.customResponseHeaders.Permissions-Policy=camera=(), microphone=(), geolocation=(self)"
#   - "traefik.http.middlewares.security-headers.headers.contentSecurityPolicy=default-src 'self'"
# ================================================================
