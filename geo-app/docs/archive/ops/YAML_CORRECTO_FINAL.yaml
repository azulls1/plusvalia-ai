services:
  backend-api:
    image: backend-inmobiliario:latest
    
    networks:
      - iagenteknet
    
    environment:
      - SUPABASE_URL=https://iagenteksupabase.iagentek.com.mx
      - SUPABASE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ewogICJyb2xlIjogImFub24iLAogICJpc3MiOiAic3VwYWJhc2UiLAogICJpYXQiOiAxNzE1MDUwODAwLAogICJleHAiOiAxODcyODE3MjAwCn0.23LYnOepZ9yTJObLFoTnszO5WdHpbekvgwMt8bn2o_k
      - SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ewogICJyb2xlIjogInNlcnZpY2Vfcm9sZSIsCiAgImlzcyI6ICJzdXBhYmFzZSIsCiAgImlhdCI6IDE3MTUwNTA4MDAsCiAgImV4cCI6IDE4NzI4MTcyMDAKfQ.82nFc9RPC-0tzN0svrqQrnHUHHe51bJkpCUiC_uTypo
      - POSTGRES_HOST=iagenteksupabase.iagentek.com.mx
      - POSTGRES_PORT=5432
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres.iagenteksupabase
      - POSTGRES_PASSWORD=Iagentek_123root@vmi2851872
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_WORKERS=4
      - ALLOWED_ORIGINS=https://iainmobiliaria.iagentek.com.mx,https://iagentek.com.mx
      - MODEL_PATH=/app/ml_model/models
      - MODEL_RETRAIN_DAYS=30
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend-inmobiliario.rule=Host(`apiinmobiliario.iagentek.com.mx`)
      - traefik.http.routers.backend-inmobiliario.entrypoints=websecure
      - traefik.http.routers.backend-inmobiliario.priority=1
      - traefik.http.routers.backend-inmobiliario.tls.certresolver=letsencryptresolver
      - traefik.http.routers.backend-inmobiliario.service=backend-inmobiliario
      - traefik.http.services.backend-inmobiliario.loadbalancer.server.port=8000
      - traefik.http.services.backend-inmobiliario.loadbalancer.passHostHeader=true
      - traefik.http.middlewares.backend-inmobiliario-cors.headers.accesscontrolallowmethods=GET,POST,PUT,DELETE,OPTIONS
      - traefik.http.middlewares.backend-inmobiliario-cors.headers.accesscontrolalloworiginlist=https://iainmobiliaria.iagentek.com.mx,https://iagentek.com.mx
      - traefik.http.middlewares.backend-inmobiliario-cors.headers.accesscontrolmaxage=100
      - traefik.http.middlewares.backend-inmobiliario-cors.headers.addvaryheader=true
      - traefik.http.routers.backend-inmobiliario.middlewares=backend-inmobiliario-cors@docker
    
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "2"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 512M

networks:
  iagenteknet:
    external: true
    name: iagenteknet

