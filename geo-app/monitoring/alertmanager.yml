# Alertmanager Configuration — geo-app
# Routes alerts from Prometheus to notification channels.

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 10s
    - match:
        severity: warning
      receiver: 'default'

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'https://iagentekn8nwebhook.iagentek.com.mx/webhook/alertmanager'
        send_resolved: true

  - name: 'critical'
    webhook_configs:
      - url: 'https://iagentekn8nwebhook.iagentek.com.mx/webhook/alertmanager-critical'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
