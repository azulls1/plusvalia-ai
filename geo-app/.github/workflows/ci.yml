# ================================================================
# CI PIPELINE — geo-app
# ================================================================
# Runs on every push to main/develop and on pull requests.
# Jobs: lint, test, build (frontend & backend), security scan, Docker build.
# ================================================================

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "18"
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE: backend-inmobiliario

permissions:
  contents: read
  security-events: write

# ================================================================
# JOBS
# ================================================================
jobs:

  # --------------------------------------------------------------
  # 1. Frontend — Lint (ESLint + Prettier)
  # --------------------------------------------------------------
  lint-frontend:
    name: "Frontend · Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx ng lint --force

      - name: Check Prettier formatting
        run: npx prettier --check "src/**/*.{ts,html,scss,css}"

  # --------------------------------------------------------------
  # 2. Frontend — Unit Tests
  # --------------------------------------------------------------
  test-frontend:
    name: "Frontend · Test"
    runs-on: ubuntu-latest
    needs: lint-frontend
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests (headless Chrome)
        run: npx ng test --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: app/coverage/
          retention-days: 14

  # --------------------------------------------------------------
  # 3. Frontend — Production Build
  # --------------------------------------------------------------
  build-frontend:
    name: "Frontend · Build"
    runs-on: ubuntu-latest
    needs: test-frontend
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npx ng build --configuration production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: app/dist/
          retention-days: 7

  # --------------------------------------------------------------
  # 4. Backend — Lint (Ruff)
  # --------------------------------------------------------------
  lint-backend:
    name: "Backend · Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff linter
        run: ruff check python_services/

      - name: Run Ruff formatter check
        run: ruff format --check python_services/

  # --------------------------------------------------------------
  # 5. Backend — Unit Tests (pytest)
  # --------------------------------------------------------------
  test-backend:
    name: "Backend · Test"
    runs-on: ubuntu-latest
    needs: lint-backend
    defaults:
      run:
        working-directory: python_services
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: python_services/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=api \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov/ \
            --cov-fail-under=70 \
            --junitxml=test-results.xml \
            -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            python_services/test-results.xml
            python_services/coverage.xml
            python_services/htmlcov/
          retention-days: 14

  # --------------------------------------------------------------
  # 6. Security Scan
  # --------------------------------------------------------------
  security-scan:
    name: "Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # -- npm audit --
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: npm audit (frontend)
        working-directory: app
        run: npm audit --audit-level=critical

      # -- pip audit --
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: pip audit (backend)
        run: |
          pip install pip-audit
          pip-audit -r python_services/requirements.txt --desc --fix || true

      # -- Trivy container scan --
      - name: Build Docker image for scanning
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:scan \
            -f python_services/Dockerfile \
            python_services/

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.DOCKER_IMAGE }}:scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Upload Trivy scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"

      # -- OWASP Dependency Check --
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "geo-app"
          path: "."
          format: "HTML"
          args: >
            --failOnCVSS 9
            --enableRetired
            --scan python_services/requirements.txt
            --scan app/package.json

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: reports/
          retention-days: 14

  # --------------------------------------------------------------
  # 7. Build & Tag Docker Image
  # --------------------------------------------------------------
  build-docker:
    name: "Docker · Build"
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend, security-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: python_services
          file: python_services/Dockerfile
          push: false
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image health
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:ci \
            -f python_services/Dockerfile python_services/
          docker run -d --name health-test ${{ env.DOCKER_IMAGE }}:ci
          sleep 10
          docker inspect --format='{{.State.Health.Status}}' health-test || true
          docker stop health-test && docker rm health-test
